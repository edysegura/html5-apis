<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Custom Event</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css"
    />
    <link rel="stylesheet" href="style.css" />
    <script src="app.js" defer></script>
  </head>
  <body>
    <main>
      <div class="container">
        <article class="event-box">
          <header>
            <h1>Custom Event Demo</h1>
          </header>

          <p>
            Trigger a custom event to demonstrate how custom events work in
            JavaScript. Click the button to dispatch an event and see the
            messages logged below.
          </p>

          <button id="trigger" autofocus>Trigger Custom Event</button>

          <fieldset>
            <label for="eventLog">Event Log</label>
            <textarea
              id="eventLog"
              placeholder="Event log messages will appear here..."
              readonly
            ></textarea>
          </fieldset>
        </article>
      </div>
    </main>
  </body>
</html>
